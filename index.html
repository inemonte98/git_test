<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wanderlog — My Trips</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky: #0ea5e9;
      --sky-dark: #0284c7;
      --sand: #fef3c7;
      --sand-dark: #fde68a;
      --text: #1e293b;
      --muted: #64748b;
      --surface: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --green: #22c55e;
      --amber: #f59e0b;
      --radius: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #0c4a6e 0%, #0ea5e9 60%, #38bdf8 100%);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.18);
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -.3px;
    }
    .logo .plane { font-size: 1.4rem; }
    .btn-new {
      background: #fff;
      color: var(--sky-dark);
      border: none;
      border-radius: 50px;
      padding: 9px 20px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: box-shadow .15s, transform .1s;
    }
    .btn-new:hover { box-shadow: 0 4px 12px rgba(0,0,0,.15); transform: translateY(-1px); }
    .btn-new:active { transform: translateY(0); }

    /* ── Hero stats bar ── */
    .stats-bar {
      background: linear-gradient(90deg, #0c4a6e, #0369a1);
      color: #fff;
      padding: 0 24px;
    }
    .stats-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      gap: 32px;
      padding: 14px 0;
    }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-value { font-size: 1.4rem; font-weight: 700; }
    .stat-label { font-size: .75rem; opacity: .75; text-transform: uppercase; letter-spacing: .05em; }
    .stat-divider { width: 1px; background: rgba(255,255,255,.2); align-self: stretch; }

    /* ── Main layout ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* ── Section headers ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-count {
      background: var(--border);
      color: var(--muted);
      font-size: .75rem;
      font-weight: 600;
      border-radius: 50px;
      padding: 2px 10px;
    }
    .see-all { font-size: .85rem; color: var(--sky); font-weight: 600; cursor: pointer; background: none; border: none; }
    .see-all:hover { text-decoration: underline; }

    /* ── Trip cards ── */
    .trips-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 48px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: box-shadow .2s, transform .15s;
      position: relative;
    }
    .card:hover { box-shadow: 0 8px 28px rgba(0,0,0,.10); transform: translateY(-3px); }
    .card:active { transform: translateY(-1px); }

    .card-cover {
      height: 160px;
      position: relative;
      overflow: hidden;
    }
    .card-cover-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    /* Gradient overlay so text is legible */
    .card-cover::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,.55));
    }

    .card-cover-emoji {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
    }

    .card-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1;
      border-radius: 50px;
      padding: 4px 12px;
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .badge-upcoming { background: var(--green); color: #fff; }
    .badge-planning { background: var(--amber); color: #fff; }
    .badge-past { background: rgba(0,0,0,.45); color: #fff; }

    .days-left {
      position: absolute;
      bottom: 12px;
      right: 12px;
      z-index: 1;
      background: rgba(0,0,0,.55);
      color: #fff;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: .75rem;
      font-weight: 600;
    }

    .card-body { padding: 16px; }
    .card-destination {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-dates {
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .card-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 4px 10px;
      font-size: .75rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── Add-trip card ── */
    .card-add {
      border: 2px dashed var(--border);
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 260px;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .card-add:hover { border-color: var(--sky); background: #f0f9ff; }
    .card-add-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--sky);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      line-height: 1;
    }
    .card-add-label { font-size: .9rem; font-weight: 600; color: var(--muted); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--card);
      border-radius: var(--radius);
      width: 100%;
      max-width: 500px;
      padding: 28px;
      transform: translateY(20px);
      transition: transform .2s;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .modal-title { font-size: 1.15rem; font-weight: 700; }
    .btn-close {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--muted);
      line-height: 1;
      padding: 4px;
    }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: 6px; }
    input, select, textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: .9rem;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--sky); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--sky), var(--sky-dark));
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .15s;
    }
    .btn-submit:hover { opacity: .9; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }
    .empty-state-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: .9rem; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .stats-inner { gap: 20px; flex-wrap: wrap; }
      .stat-divider { display: none; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="header-inner">
    <div class="logo">
      <span class="plane">✈️</span>
      Wanderlog
    </div>
    <button class="btn-new" onclick="openModal()">
      <span>＋</span> New Trip
    </button>
  </div>
</header>

<!-- ── Stats bar ── -->
<div class="stats-bar">
  <div class="stats-inner" id="stats-bar">
    <div class="stat">
      <span class="stat-value" id="stat-total">0</span>
      <span class="stat-label">Total Trips</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-value" id="stat-upcoming">0</span>
      <span class="stat-label">Upcoming</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-value" id="stat-countries">0</span>
      <span class="stat-label">Countries</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-value" id="stat-days">0</span>
      <span class="stat-label">Days Abroad</span>
    </div>
  </div>
</div>

<!-- ── Main ── -->
<main>

  <!-- Upcoming / Planning -->
  <div class="section-header">
    <div class="section-title">
      🗓️ Upcoming &amp; Planning
      <span class="section-count" id="count-upcoming">0</span>
    </div>
  </div>
  <div class="trips-grid" id="grid-upcoming">
    <!-- cards injected by JS -->
  </div>

  <!-- Past trips -->
  <div class="section-header">
    <div class="section-title">
      📸 Past Adventures
      <span class="section-count" id="count-past">0</span>
    </div>
  </div>
  <div class="trips-grid" id="grid-past">
    <!-- cards injected by JS -->
  </div>

</main>

<!-- ── New-trip modal ── -->
<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Plan a New Trip ✈️</div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <form id="trip-form" onsubmit="addTrip(event)">
      <div class="form-group">
        <label for="f-destination">Destination</label>
        <input id="f-destination" type="text" placeholder="e.g. Tokyo, Japan" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="f-start">Start date</label>
          <input id="f-start" type="date" required />
        </div>
        <div class="form-group">
          <label for="f-end">End date</label>
          <input id="f-end" type="date" required />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="f-travelers">Travelers</label>
          <select id="f-travelers">
            <option value="Solo">Solo</option>
            <option value="Couple" selected>Couple</option>
            <option value="Family">Family</option>
            <option value="Group">Group</option>
          </select>
        </div>
        <div class="form-group">
          <label for="f-emoji">Cover emoji</label>
          <select id="f-emoji">
            <option value="🏖️">🏖️ Beach</option>
            <option value="🏔️">🏔️ Mountains</option>
            <option value="🏙️">🏙️ City</option>
            <option value="🏯">🏯 Culture</option>
            <option value="🌴">🌴 Tropical</option>
            <option value="🗺️">🗺️ Road trip</option>
            <option value="⛷️">⛷️ Ski</option>
            <option value="🌊">🌊 Cruise</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label for="f-notes">Notes (optional)</label>
        <textarea id="f-notes" rows="2" placeholder="Flight numbers, hotels, must-see spots…"></textarea>
      </div>
      <button class="btn-submit" type="submit">Add Trip</button>
    </form>
  </div>
</div>

<script>
  // ── Sample seed data ──
  const SEED = [
    {
      id: 1, destination: 'Kyoto, Japan', emoji: '🏯',
      start: '2026-05-10', end: '2026-05-22',
      travelers: 'Couple', notes: 'Cherry blossom season, Arashiyama bamboo grove'
    },
    {
      id: 2, destination: 'Santorini, Greece', emoji: '🌊',
      start: '2026-07-03', end: '2026-07-13',
      travelers: 'Couple', notes: 'Oia sunset, wine tour, caldera boat trip'
    },
    {
      id: 3, destination: 'Patagonia, Argentina', emoji: '🏔️',
      start: '2026-11-15', end: '2026-11-30',
      travelers: 'Group', notes: 'Torres del Paine trek, glaciers'
    },
    {
      id: 4, destination: 'Bali, Indonesia', emoji: '🌴',
      start: '2025-03-01', end: '2025-03-14',
      travelers: 'Couple', notes: 'Ubud rice terraces, Uluwatu temple, surf lessons'
    },
    {
      id: 5, destination: 'New York City, USA', emoji: '🏙️',
      start: '2024-12-20', end: '2024-12-28',
      travelers: 'Family', notes: 'Christmas markets, MoMA, Brooklyn Bridge'
    },
    {
      id: 6, destination: 'Amalfi Coast, Italy', emoji: '🏖️',
      start: '2024-08-05', end: '2024-08-16',
      travelers: 'Couple', notes: 'Positano, Ravello, limoncello tour'
    },
  ];

  const STORAGE_KEY = 'wanderlog_trips';
  let trips = [];

  function loadTrips() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      trips = raw ? JSON.parse(raw) : [...SEED];
    } catch {
      trips = [...SEED];
    }
    if (!trips.length) trips = [...SEED];
  }

  function saveTrips() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(trips));
  }

  // ── Date helpers ──
  const today = () => new Date().toISOString().slice(0, 10);

  function tripStatus(trip) {
    const now = today();
    if (trip.start > now) return trip.start <= addDays(now, 90) ? 'upcoming' : 'planning';
    if (trip.end >= now) return 'upcoming';
    return 'past';
  }

  function addDays(dateStr, n) {
    const d = new Date(dateStr);
    d.setDate(d.getDate() + n);
    return d.toISOString().slice(0, 10);
  }

  function daysUntil(dateStr) {
    const diff = (new Date(dateStr) - new Date(today())) / 86400000;
    return Math.ceil(diff);
  }

  function durationDays(start, end) {
    return Math.round((new Date(end) - new Date(start)) / 86400000) + 1;
  }

  function fmtDate(dateStr) {
    return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric'
    });
  }

  // ── Render ──
  function render() {
    const upcoming = trips.filter(t => tripStatus(t) !== 'past');
    const past     = trips.filter(t => tripStatus(t) === 'past')
                         .sort((a, b) => b.start.localeCompare(a.start));

    document.getElementById('count-upcoming').textContent = upcoming.length;
    document.getElementById('count-past').textContent     = past.length;

    // Stats
    const allCountries = new Set(trips.map(t => t.destination.split(',').pop().trim()));
    const totalDays = past.reduce((s, t) => s + durationDays(t.start, t.end), 0);
    document.getElementById('stat-total').textContent    = trips.length;
    document.getElementById('stat-upcoming').textContent = upcoming.length;
    document.getElementById('stat-countries').textContent = allCountries.size;
    document.getElementById('stat-days').textContent     = totalDays;

    renderGrid('grid-upcoming', upcoming, true);
    renderGrid('grid-past',     past,     false);
  }

  function renderGrid(gridId, items, showAdd) {
    const grid = document.getElementById(gridId);
    grid.innerHTML = '';

    if (!items.length && !showAdd) {
      grid.innerHTML = `<div class="empty-state">
        <div class="empty-state-icon">🌍</div>
        <p>No past trips yet — your adventures await!</p>
      </div>`;
      return;
    }

    items.forEach(trip => {
      grid.appendChild(buildCard(trip));
    });

    if (showAdd) {
      const addCard = document.createElement('div');
      addCard.className = 'card card-add';
      addCard.onclick = openModal;
      addCard.innerHTML = `
        <div class="card-add-icon">＋</div>
        <div class="card-add-label">Plan your next trip</div>
      `;
      grid.appendChild(addCard);
    }
  }

  function buildCard(trip) {
    const status   = tripStatus(trip);
    const duration = durationDays(trip.start, trip.end);
    const until    = daysUntil(trip.start);

    const badgeClass = status === 'past' ? 'badge-past'
                     : status === 'upcoming' ? 'badge-upcoming'
                     : 'badge-planning';
    const badgeLabel = status === 'past' ? 'Completed'
                     : status === 'upcoming' ? 'Upcoming'
                     : 'Planning';

    const daysLeftHtml = status !== 'past' && until > 0
      ? `<div class="days-left">${until}d away</div>`
      : status === 'upcoming' && until <= 0
      ? `<div class="days-left">In progress</div>`
      : '';

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-cover" style="background: ${coverGradient(trip.emoji)}">
        <div class="card-cover-emoji">${trip.emoji}</div>
        <span class="card-badge ${badgeClass}">${badgeLabel}</span>
        ${daysLeftHtml}
      </div>
      <div class="card-body">
        <div class="card-destination">${trip.destination}</div>
        <div class="card-dates">📅 ${fmtDate(trip.start)} – ${fmtDate(trip.end)}</div>
        <div class="card-meta">
          <span class="chip">🌙 ${duration} nights</span>
          <span class="chip">👥 ${trip.travelers}</span>
          ${trip.notes ? `<span class="chip" title="${trip.notes}">📝 Notes</span>` : ''}
        </div>
      </div>
    `;
    return card;
  }

  function coverGradient(emoji) {
    const map = {
      '🏖️': 'linear-gradient(135deg,#fbbf24,#f97316)',
      '🏔️': 'linear-gradient(135deg,#64748b,#334155)',
      '🏙️': 'linear-gradient(135deg,#6366f1,#4f46e5)',
      '🏯': 'linear-gradient(135deg,#ef4444,#b91c1c)',
      '🌴': 'linear-gradient(135deg,#22c55e,#16a34a)',
      '🗺️': 'linear-gradient(135deg,#f59e0b,#d97706)',
      '⛷️': 'linear-gradient(135deg,#38bdf8,#0284c7)',
      '🌊': 'linear-gradient(135deg,#0ea5e9,#0c4a6e)',
    };
    return map[emoji] || 'linear-gradient(135deg,#94a3b8,#64748b)';
  }

  // ── Modal ──
  function openModal() {
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('f-destination').focus();
  }
  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.getElementById('trip-form').reset();
  }
  function overlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  // ── Add trip ──
  function addTrip(e) {
    e.preventDefault();
    const start = document.getElementById('f-start').value;
    const end   = document.getElementById('f-end').value;
    if (end < start) {
      alert('End date must be after start date.');
      return;
    }
    const trip = {
      id:          Date.now(),
      destination: document.getElementById('f-destination').value.trim(),
      emoji:       document.getElementById('f-emoji').value,
      start, end,
      travelers:   document.getElementById('f-travelers').value,
      notes:       document.getElementById('f-notes').value.trim(),
    };
    trips.unshift(trip);
    saveTrips();
    render();
    closeModal();
  }

  // ── Keyboard shortcut ──
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  // ── Init ──
  loadTrips();
  render();
</script>
</body>
</html>
