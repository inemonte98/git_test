<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wanderlog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fff;
      --surface: #f7f7f7;
      --border: #e8e8e8;
      --text: #111;
      --muted: #888;
      --radius: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ── Views ── */
    .view { display: none; min-height: 100vh; }
    .view.active { display: block; }

    /* ══════════════════════════════
       LIST VIEW
    ══════════════════════════════ */
    #view-list header {
      position: sticky; top: 0; z-index: 50;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
    }
    .header-row {
      max-width: 680px; margin: 0 auto;
      height: 58px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: -.3px; }

    .btn-primary {
      background: var(--text); color: #fff; border: none;
      border-radius: 50px; padding: 9px 18px;
      font-size: .85rem; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .78; }

    /* stats */
    .stats-wrap {
      max-width: 680px; margin: 0 auto;
      padding: 18px 20px 0;
      display: flex; gap: 0;
    }
    .stat {
      flex: 1; padding: 0 16px;
      border-right: 1px solid var(--border);
    }
    .stat:first-child { padding-left: 0; }
    .stat:last-child  { border-right: none; }
    .stat-val  { font-size: 1.45rem; font-weight: 700; letter-spacing: -.5px; }
    .stat-lbl  { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }

    /* list main */
    .list-main {
      max-width: 680px; margin: 0 auto;
      padding: 26px 20px 80px;
    }

    .section-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 14px; margin-top: 30px;
    }
    .section-head:first-child { margin-top: 0; }
    .section-title { font-size: .95rem; font-weight: 700; }
    .section-sub   { font-size: .8rem; color: var(--muted); }

    /* trip card */
    .trip-card {
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 16px;
      background: var(--bg);
      cursor: pointer;
      transition: box-shadow .2s;
      position: relative;
    }
    .trip-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,.08); }

    .card-img-wrap {
      position: relative; height: 190px; overflow: hidden;
    }
    .card-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .card-badge {
      position: absolute; top: 12px; left: 12px;
      border-radius: 50px; padding: 4px 11px;
      font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
    }
    .badge-upcoming { background: #111; color: #fff; }
    .badge-planning { background: rgba(255,255,255,.9); color: #333; }
    .badge-past     { background: rgba(255,255,255,.7); color: #666; }

    .card-days-chip {
      position: absolute; bottom: 12px; right: 12px;
      background: rgba(255,255,255,.9); color: #111;
      border-radius: 50px; padding: 4px 12px;
      font-size: .75rem; font-weight: 600;
    }

    /* edit button on card */
    .card-edit-btn {
      position: absolute; top: 10px; right: 10px; z-index: 2;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,.9); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: .85rem;
      transition: background .15s;
    }
    .card-edit-btn:hover { background: #fff; }

    .card-body { padding: 14px 16px 16px; }
    .card-dest  { font-size: 1rem; font-weight: 700; margin-bottom: 3px; }
    .card-dates { font-size: .8rem; color: var(--muted); margin-bottom: 10px; }
    .chips      { display: flex; gap: 7px; flex-wrap: wrap; }
    .chip {
      background: var(--surface); border-radius: 50px;
      padding: 4px 11px; font-size: .74rem; color: var(--muted);
    }

    /* add-trip tile */
    .add-tile {
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      width: 100%; background: none;
      padding: 26px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 10px; color: var(--muted);
      font-size: .88rem; font-weight: 500;
      transition: border-color .2s, color .2s;
      margin-bottom: 16px;
    }
    .add-tile:hover { border-color: #aaa; color: var(--text); }
    .add-tile-icon {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: .95rem;
    }

    /* empty */
    .empty { padding: 36px 0; text-align: center; color: var(--muted); font-size: .88rem; }

    /* ══════════════════════════════
       DETAIL VIEW
    ══════════════════════════════ */
    #view-detail {
      padding-bottom: 80px;
    }

    .detail-hero {
      position: relative; height: 260px; overflow: hidden;
    }
    .detail-hero img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .detail-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,.35) 0%, transparent 45%, rgba(0,0,0,.45) 100%);
    }
    .detail-back {
      position: absolute; top: 14px; left: 14px;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,.9); border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; cursor: pointer;
    }
    .detail-edit-btn {
      position: absolute; top: 14px; right: 14px;
      background: rgba(255,255,255,.9); border: none;
      border-radius: 50px; padding: 7px 14px;
      font-size: .78rem; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 5px;
    }
    .detail-hero-text {
      position: absolute; bottom: 16px; left: 18px; right: 18px; color: #fff;
    }
    .detail-dest { font-size: 1.5rem; font-weight: 700; letter-spacing: -.3px; text-shadow: 0 1px 4px rgba(0,0,0,.4); }
    .detail-sub  { font-size: .85rem; opacity: .9; margin-top: 3px; }

    .detail-body {
      max-width: 680px; margin: 0 auto; padding: 24px 20px 0;
    }

    /* trip meta chips */
    .detail-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .detail-chip {
      background: var(--surface); border-radius: 50px;
      padding: 7px 14px; font-size: .82rem; color: var(--text);
    }

    /* itinerary */
    .itinerary-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .itinerary-title { font-size: .95rem; font-weight: 700; }

    /* day group */
    .day-group { margin-bottom: 28px; }
    .day-label {
      font-size: .75rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .07em;
      margin-bottom: 12px;
    }

    /* activity row */
    .activity-row {
      display: flex; gap: 14px; align-items: flex-start;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .1s;
    }
    .activity-row:last-child { border-bottom: none; }
    .activity-row:hover { background: var(--surface); margin: 0 -8px; padding-left: 8px; padding-right: 8px; border-radius: 10px; }

    .activity-time {
      min-width: 46px; text-align: right;
      font-size: .78rem; font-weight: 600; color: var(--muted);
      padding-top: 2px;
    }
    .activity-dot-col {
      display: flex; flex-direction: column; align-items: center; padding-top: 5px;
    }
    .activity-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--text); flex-shrink: 0;
    }
    .activity-line {
      width: 1px; flex: 1; min-height: 20px;
      background: var(--border); margin-top: 4px;
    }
    .activity-info { flex: 1; }
    .activity-place { font-size: .92rem; font-weight: 600; }
    .activity-what  { font-size: .82rem; color: var(--muted); margin-top: 2px; }

    .no-activities {
      padding: 32px 0; text-align: center;
      color: var(--muted); font-size: .88rem;
    }

    /* ══════════════════════════════
       BOTTOM SHEETS (MODALS)
    ══════════════════════════════ */
    .sheet-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .22s;
    }
    .sheet-overlay.open { opacity: 1; pointer-events: all; }

    .sheet {
      background: var(--bg);
      border-radius: 22px 22px 0 0;
      width: 100%; max-width: 680px;
      padding: 0 20px 40px;
      max-height: 92vh; overflow-y: auto;
      transform: translateY(30px);
      transition: transform .25s;
    }
    .sheet-overlay.open .sheet { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--border); margin: 14px auto 20px;
    }
    .sheet-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 20px; }

    .form-group { margin-bottom: 14px; }
    label {
      display: block; font-size: .75rem; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: .05em;
      margin-bottom: 5px;
    }
    input, select, textarea {
      width: 100%; border: 1.5px solid var(--border);
      border-radius: 10px; padding: 11px 14px;
      font-size: .92rem; color: var(--text);
      background: var(--bg); outline: none;
      font-family: inherit; transition: border-color .15s;
      appearance: none;
    }
    input:focus, select:focus, textarea:focus { border-color: #999; }
    textarea { resize: none; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .sheet-actions { display: flex; gap: 10px; margin-top: 6px; }
    .btn-submit {
      flex: 1; background: var(--text); color: #fff; border: none;
      border-radius: 10px; padding: 13px;
      font-size: .92rem; font-weight: 600; cursor: pointer;
      transition: opacity .15s;
    }
    .btn-submit:hover { opacity: .8; }
    .btn-danger {
      background: none; color: #e11d48; border: 1.5px solid #fecdd3;
      border-radius: 10px; padding: 13px 18px;
      font-size: .85rem; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    .btn-danger:hover { background: #fff1f2; }

    @media (max-width: 420px) {
      .form-row { grid-template-columns: 1fr; }
      .stat-val { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════
     VIEW: LIST
════════════════════════════ -->
<div id="view-list" class="view active">
  <header>
    <div class="header-row">
      <div class="logo">✈ Wanderlog</div>
      <button class="btn-primary" onclick="openTripSheet()">+ New trip</button>
    </div>
  </header>

  <div class="stats-wrap">
    <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">Trips</div></div>
    <div class="stat"><div class="stat-val" id="s-upcoming">0</div><div class="stat-lbl">Upcoming</div></div>
    <div class="stat"><div class="stat-val" id="s-countries">0</div><div class="stat-lbl">Countries</div></div>
    <div class="stat"><div class="stat-val" id="s-days">0</div><div class="stat-lbl">Days abroad</div></div>
  </div>

  <div class="list-main">
    <div class="section-head">
      <span class="section-title">Upcoming & planning</span>
      <span class="section-sub" id="lbl-upcoming"></span>
    </div>
    <div id="list-upcoming"></div>

    <div class="section-head">
      <span class="section-title">Past adventures</span>
      <span class="section-sub" id="lbl-past"></span>
    </div>
    <div id="list-past"></div>
  </div>
</div>

<!-- ════════════════════════════
     VIEW: DETAIL
════════════════════════════ -->
<div id="view-detail" class="view">
  <div class="detail-hero">
    <img id="detail-hero-img" src="" alt="" />
    <div class="detail-hero-overlay"></div>
    <button class="detail-back" onclick="showList()">←</button>
    <button class="detail-edit-btn" onclick="openTripSheet(currentTripId)">✎ Edit trip</button>
    <div class="detail-hero-text">
      <div class="detail-dest" id="detail-dest"></div>
      <div class="detail-sub"  id="detail-sub"></div>
    </div>
  </div>

  <div class="detail-body">
    <div class="detail-chips" id="detail-chips"></div>

    <div class="itinerary-header">
      <span class="itinerary-title">Itinerary</span>
      <button class="btn-primary" onclick="openActivitySheet()">+ Add</button>
    </div>
    <div id="itinerary"></div>
  </div>
</div>

<!-- ════════════════════════════
     SHEET: ADD / EDIT TRIP
════════════════════════════ -->
<div class="sheet-overlay" id="trip-overlay" onclick="sheetOverlayClick(event,'trip-overlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="trip-sheet-title">Plan a new trip</div>
    <form id="trip-form" onsubmit="submitTrip(event)">
      <div class="form-group">
        <label>Destination</label>
        <input id="tf-dest" type="text" placeholder="e.g. Tokyo, Japan" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Start date</label>
          <input id="tf-start" type="date" required />
        </div>
        <div class="form-group">
          <label>End date</label>
          <input id="tf-end" type="date" required />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Travelers</label>
          <select id="tf-travelers">
            <option value="Solo">Solo</option>
            <option value="Couple">Couple</option>
            <option value="Family">Family</option>
            <option value="Group">Group</option>
          </select>
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="tf-type">
            <option value="beach">🏖 Beach</option>
            <option value="mountains">🏔 Mountains</option>
            <option value="city">🏙 City</option>
            <option value="culture">🏯 Culture</option>
            <option value="tropical">🌴 Tropical</option>
            <option value="road">🗺 Road trip</option>
            <option value="ski">⛷ Ski</option>
            <option value="cruise">🌊 Cruise</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="tf-notes" rows="2" placeholder="Hotels, flights, must-see spots…"></textarea>
      </div>
      <div class="sheet-actions">
        <button class="btn-submit" type="submit">Save trip</button>
        <button class="btn-danger" type="button" id="trip-delete-btn" style="display:none" onclick="deleteTrip()">Delete</button>
      </div>
    </form>
  </div>
</div>

<!-- ════════════════════════════
     SHEET: ADD / EDIT ACTIVITY
════════════════════════════ -->
<div class="sheet-overlay" id="act-overlay" onclick="sheetOverlayClick(event,'act-overlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="act-sheet-title">Add a place or activity</div>
    <form id="act-form" onsubmit="submitActivity(event)">
      <div class="form-group">
        <label>Place</label>
        <input id="af-place" type="text" placeholder="e.g. Arashiyama Bamboo Grove" required />
      </div>
      <div class="form-group">
        <label>What are you doing?</label>
        <input id="af-what" type="text" placeholder="e.g. Morning walk through the forest" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date</label>
          <input id="af-date" type="date" required />
        </div>
        <div class="form-group">
          <label>Time</label>
          <input id="af-time" type="time" />
        </div>
      </div>
      <div class="sheet-actions">
        <button class="btn-submit" type="submit">Save</button>
        <button class="btn-danger" type="button" id="act-delete-btn" style="display:none" onclick="deleteActivity()">Delete</button>
      </div>
    </form>
  </div>
</div>

<script>
  /* ── Photos ── */
  const DEST_PHOTOS = {
    'Kyoto, Japan':           'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=800&q=80',
    'Santorini, Greece':      'https://images.unsplash.com/photo-1570077188670-e3a8d69ac5ff?w=800&q=80',
    'Patagonia, Argentina':   'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=800&q=80',
    'Bali, Indonesia':        'https://images.unsplash.com/photo-1537996194471-e657df975ab4?w=800&q=80',
    'New York City, USA':     'https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?w=800&q=80',
    'Amalfi Coast, Italy':    'https://images.unsplash.com/photo-1516483638261-f4dbaf036963?w=800&q=80',
  };
  const TYPE_PHOTOS = {
    beach:     'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800&q=80',
    mountains: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=800&q=80',
    city:      'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=800&q=80',
    culture:   'https://images.unsplash.com/photo-1528360983277-13d401cdc186?w=800&q=80',
    tropical:  'https://images.unsplash.com/photo-1559494007-9f5847c49d94?w=800&q=80',
    road:      'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=800&q=80',
    ski:       'https://images.unsplash.com/photo-1549880338-65ddcdfd017b?w=800&q=80',
    cruise:    'https://images.unsplash.com/photo-1548574505-5e239809ee19?w=800&q=80',
  };
  function tripPhoto(t) { return DEST_PHOTOS[t.destination] || TYPE_PHOTOS[t.type] || TYPE_PHOTOS.city; }

  /* ── Seed data ── */
  const SEED = [
    { id: 1, destination: 'Kyoto, Japan',        start: '2026-05-10', end: '2026-05-22', travelers: 'Couple', type: 'culture',   notes: 'Cherry blossom season', activities: [
      { id: 11, place: 'Arashiyama Bamboo Grove', what: 'Morning walk',            date: '2026-05-11', time: '08:00' },
      { id: 12, place: 'Fushimi Inari Shrine',    what: 'Hike the torii gates',   date: '2026-05-12', time: '07:30' },
      { id: 13, place: 'Nishiki Market',          what: 'Street food lunch',       date: '2026-05-12', time: '12:30' },
    ]},
    { id: 2, destination: 'Santorini, Greece',    start: '2026-07-03', end: '2026-07-13', travelers: 'Couple', type: 'cruise',    notes: 'Oia sunset, wine tour', activities: [] },
    { id: 3, destination: 'Patagonia, Argentina', start: '2026-11-15', end: '2026-11-30', travelers: 'Group',  type: 'mountains', notes: 'Torres del Paine trek', activities: [] },
    { id: 4, destination: 'Bali, Indonesia',      start: '2025-03-01', end: '2025-03-14', travelers: 'Couple', type: 'tropical',  notes: 'Ubud rice terraces',    activities: [
      { id: 41, place: 'Tegalalang Rice Terrace', what: 'Sunrise walk',            date: '2025-03-03', time: '06:00' },
      { id: 42, place: 'Uluwatu Temple',          what: 'Kecak fire dance show',   date: '2025-03-05', time: '18:00' },
    ]},
    { id: 5, destination: 'New York City, USA',   start: '2024-12-20', end: '2024-12-28', travelers: 'Family', type: 'city',      notes: 'Christmas markets',     activities: [] },
    { id: 6, destination: 'Amalfi Coast, Italy',  start: '2024-08-05', end: '2024-08-16', travelers: 'Couple', type: 'beach',     notes: 'Positano, Ravello',     activities: [] },
  ];

  /* ── State ── */
  const KEY = 'wanderlog_v3';
  let trips = [];
  let currentTripId = null;
  let editingTripId = null;
  let editingActId  = null;

  function load() {
    try { trips = JSON.parse(localStorage.getItem(KEY)) || SEED.map(t => ({...t})); }
    catch { trips = SEED.map(t => ({...t})); }
    if (!trips.length) trips = SEED.map(t => ({...t}));
  }
  function save() { localStorage.setItem(KEY, JSON.stringify(trips)); }
  function uid()  { return Date.now() + Math.random(); }

  /* ── Date helpers ── */
  const todayStr = () => new Date().toISOString().slice(0, 10);

  function tripStatus(t) {
    const now = todayStr();
    if (t.end < now) return 'past';
    if (t.start <= now) return 'upcoming';
    const soon = new Date(); soon.setDate(soon.getDate() + 90);
    return t.start <= soon.toISOString().slice(0, 10) ? 'upcoming' : 'planning';
  }

  function daysUntil(s) { return Math.ceil((new Date(s) - new Date(todayStr())) / 86400000); }
  function duration(s, e) { return Math.round((new Date(e) - new Date(s)) / 86400000) + 1; }

  function fmtDate(s) {
    return new Date(s + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }
  function fmtDayLabel(s) {
    return new Date(s + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  }

  /* ── Views ── */
  function showList() {
    document.getElementById('view-list').classList.add('active');
    document.getElementById('view-detail').classList.remove('active');
    currentTripId = null;
    renderList();
  }

  function showDetail(id) {
    currentTripId = id;
    document.getElementById('view-list').classList.remove('active');
    document.getElementById('view-detail').classList.add('active');
    renderDetail();
    window.scrollTo(0, 0);
  }

  /* ── Render list ── */
  function renderList() {
    const upcoming = trips.filter(t => tripStatus(t) !== 'past');
    const past     = trips.filter(t => tripStatus(t) === 'past').sort((a, b) => b.start.localeCompare(a.start));
    const countries = new Set(trips.map(t => t.destination.split(',').pop().trim())).size;
    const daysAbroad = trips.filter(t => tripStatus(t) === 'past').reduce((s, t) => s + duration(t.start, t.end), 0);

    document.getElementById('s-total').textContent    = trips.length;
    document.getElementById('s-upcoming').textContent = upcoming.length;
    document.getElementById('s-countries').textContent = countries;
    document.getElementById('s-days').textContent     = daysAbroad;
    document.getElementById('lbl-upcoming').textContent = upcoming.length ? `${upcoming.length} trip${upcoming.length > 1 ? 's' : ''}` : '';
    document.getElementById('lbl-past').textContent     = past.length     ? `${past.length} trip${past.length > 1 ? 's' : ''}` : '';

    renderTripList('list-upcoming', upcoming, true);
    renderTripList('list-past',     past,     false);
  }

  function renderTripList(containerId, items, showAdd) {
    const el = document.getElementById(containerId);
    el.innerHTML = '';

    if (!items.length && !showAdd) {
      el.innerHTML = '<div class="empty">No past trips yet.</div>';
      return;
    }

    items.forEach(t => {
      const s     = tripStatus(t);
      const until = daysUntil(t.start);
      const badgeClass = s === 'past' ? 'badge-past' : s === 'upcoming' ? 'badge-upcoming' : 'badge-planning';
      const badgeLabel = s === 'past' ? 'Completed' : s === 'upcoming' ? 'Upcoming' : 'Planning';
      const daysHtml = s !== 'past' && until > 0
        ? `<div class="card-days-chip">${until}d away</div>`
        : (s === 'upcoming' && until <= 0 ? `<div class="card-days-chip">In progress</div>` : '');
      const actCount = (t.activities || []).length;

      const card = document.createElement('div');
      card.className = 'trip-card';
      card.innerHTML = `
        <div class="card-img-wrap">
          <img src="${tripPhoto(t)}" alt="${t.destination}" loading="lazy" />
          <span class="card-badge ${badgeClass}">${badgeLabel}</span>
          ${daysHtml}
          <button class="card-edit-btn" onclick="event.stopPropagation(); openTripSheet(${t.id})">✎</button>
        </div>
        <div class="card-body">
          <div class="card-dest">${t.destination}</div>
          <div class="card-dates">${fmtDate(t.start)} – ${fmtDate(t.end)}</div>
          <div class="chips">
            <span class="chip">${duration(t.start, t.end)} nights</span>
            <span class="chip">${t.travelers}</span>
            ${actCount ? `<span class="chip">${actCount} place${actCount > 1 ? 's' : ''}</span>` : ''}
          </div>
        </div>
      `;
      card.addEventListener('click', () => showDetail(t.id));
      el.appendChild(card);
    });

    if (showAdd) {
      const btn = document.createElement('button');
      btn.className = 'add-tile';
      btn.innerHTML = '<div class="add-tile-icon">＋</div> Plan your next trip';
      btn.onclick = () => openTripSheet();
      el.appendChild(btn);
    }
  }

  /* ── Render detail ── */
  function renderDetail() {
    const t = trips.find(x => x.id === currentTripId);
    if (!t) { showList(); return; }

    document.getElementById('detail-hero-img').src = tripPhoto(t);
    document.getElementById('detail-hero-img').alt = t.destination;
    document.getElementById('detail-dest').textContent = t.destination;
    document.getElementById('detail-sub').textContent  = `${fmtDate(t.start)} – ${fmtDate(t.end)}`;

    const chips = document.getElementById('detail-chips');
    chips.innerHTML = '';
    [
      `${duration(t.start, t.end)} nights`,
      t.travelers,
      ...(t.notes ? [t.notes] : []),
    ].forEach(txt => {
      const c = document.createElement('div');
      c.className = 'detail-chip';
      c.textContent = txt;
      chips.appendChild(c);
    });

    renderItinerary(t);
  }

  function renderItinerary(t) {
    const el = document.getElementById('itinerary');
    el.innerHTML = '';
    const acts = [...(t.activities || [])].sort((a, b) => {
      const da = a.date + (a.time || '00:00');
      const db = b.date + (b.time || '00:00');
      return da.localeCompare(db);
    });

    if (!acts.length) {
      el.innerHTML = '<div class="no-activities">No places added yet. Tap + Add to start planning.</div>';
      return;
    }

    const byDay = {};
    acts.forEach(a => { (byDay[a.date] = byDay[a.date] || []).push(a); });

    Object.keys(byDay).sort().forEach(date => {
      const group = document.createElement('div');
      group.className = 'day-group';
      group.innerHTML = `<div class="day-label">${fmtDayLabel(date)}</div>`;

      byDay[date].forEach((a, idx, arr) => {
        const row = document.createElement('div');
        row.className = 'activity-row';
        row.innerHTML = `
          <div class="activity-time">${a.time || '—'}</div>
          <div class="activity-dot-col">
            <div class="activity-dot"></div>
            ${idx < arr.length - 1 ? '<div class="activity-line"></div>' : ''}
          </div>
          <div class="activity-info">
            <div class="activity-place">${a.place}</div>
            ${a.what ? `<div class="activity-what">${a.what}</div>` : ''}
          </div>
        `;
        row.addEventListener('click', () => openActivitySheet(a.id));
        group.appendChild(row);
      });

      el.appendChild(group);
    });
  }

  /* ── Trip sheet ── */
  function openTripSheet(id) {
    editingTripId = id || null;
    const t = id ? trips.find(x => x.id === id) : null;

    document.getElementById('trip-sheet-title').textContent = t ? 'Edit trip' : 'Plan a new trip';
    document.getElementById('trip-delete-btn').style.display = t ? 'block' : 'none';
    document.getElementById('tf-dest').value      = t ? t.destination : '';
    document.getElementById('tf-start').value     = t ? t.start : '';
    document.getElementById('tf-end').value       = t ? t.end : '';
    document.getElementById('tf-travelers').value = t ? t.travelers : 'Couple';
    document.getElementById('tf-type').value      = t ? t.type : 'city';
    document.getElementById('tf-notes').value     = t ? (t.notes || '') : '';

    document.getElementById('trip-overlay').classList.add('open');
  }

  function closeTripSheet() {
    document.getElementById('trip-overlay').classList.remove('open');
    editingTripId = null;
  }

  function submitTrip(e) {
    e.preventDefault();
    const start = document.getElementById('tf-start').value;
    const end   = document.getElementById('tf-end').value;
    if (end < start) { alert('End date must be after start date.'); return; }

    if (editingTripId) {
      const t = trips.find(x => x.id === editingTripId);
      t.destination = document.getElementById('tf-dest').value.trim();
      t.start       = start;
      t.end         = end;
      t.travelers   = document.getElementById('tf-travelers').value;
      t.type        = document.getElementById('tf-type').value;
      t.notes       = document.getElementById('tf-notes').value.trim();
    } else {
      trips.unshift({
        id: uid(), activities: [],
        destination: document.getElementById('tf-dest').value.trim(),
        start, end,
        travelers: document.getElementById('tf-travelers').value,
        type:      document.getElementById('tf-type').value,
        notes:     document.getElementById('tf-notes').value.trim(),
      });
    }

    save();
    closeTripSheet();
    if (currentTripId) renderDetail(); else renderList();
  }

  function deleteTrip() {
    if (!confirm('Delete this trip?')) return;
    trips = trips.filter(t => t.id !== editingTripId);
    save();
    closeTripSheet();
    showList();
  }

  /* ── Activity sheet ── */
  function openActivitySheet(id) {
    editingActId = id || null;
    const t = trips.find(x => x.id === currentTripId);
    const a = id ? (t.activities || []).find(x => x.id === id) : null;

    document.getElementById('act-sheet-title').textContent = a ? 'Edit activity' : 'Add a place or activity';
    document.getElementById('act-delete-btn').style.display = a ? 'block' : 'none';
    document.getElementById('af-place').value = a ? a.place : '';
    document.getElementById('af-what').value  = a ? (a.what || '') : '';
    document.getElementById('af-date').value  = a ? a.date : (t ? t.start : '');
    document.getElementById('af-time').value  = a ? (a.time || '') : '';

    document.getElementById('act-overlay').classList.add('open');
  }

  function closeActivitySheet() {
    document.getElementById('act-overlay').classList.remove('open');
    editingActId = null;
  }

  function submitActivity(e) {
    e.preventDefault();
    const t = trips.find(x => x.id === currentTripId);
    if (!t) return;
    if (!t.activities) t.activities = [];

    if (editingActId) {
      const a = t.activities.find(x => x.id === editingActId);
      a.place = document.getElementById('af-place').value.trim();
      a.what  = document.getElementById('af-what').value.trim();
      a.date  = document.getElementById('af-date').value;
      a.time  = document.getElementById('af-time').value;
    } else {
      t.activities.push({
        id:    uid(),
        place: document.getElementById('af-place').value.trim(),
        what:  document.getElementById('af-what').value.trim(),
        date:  document.getElementById('af-date').value,
        time:  document.getElementById('af-time').value,
      });
    }

    save();
    closeActivitySheet();
    renderDetail();
  }

  function deleteActivity() {
    if (!confirm('Remove this activity?')) return;
    const t = trips.find(x => x.id === currentTripId);
    t.activities = (t.activities || []).filter(a => a.id !== editingActId);
    save();
    closeActivitySheet();
    renderDetail();
  }

  /* ── Overlay click-outside close ── */
  function sheetOverlayClick(e, id) {
    if (e.target === document.getElementById(id)) {
      if (id === 'trip-overlay') closeTripSheet();
      else closeActivitySheet();
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeTripSheet(); closeActivitySheet(); }
  });

  /* ── Init ── */
  load();
  renderList();
</script>
</body>
</html>
